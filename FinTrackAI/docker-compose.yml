version: '3.9'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: fintrackai-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fintrackai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/fintrackai
      XAI_API_KEY: ${XAI_API_KEY}
    depends_on:
      - db

volumes:
  pgdata: