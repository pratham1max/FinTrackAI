<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrackAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body class="bg-gray-950 text-gray-100">
<div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-64 bg-gray-900 border-r border-gray-800 flex flex-col">
        <div class="p-6 border-b border-gray-800">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center text-white font-bold text-2xl">F</div>
                <h1 class="text-3xl font-semibold">FinTrackAI</h1>
            </div>
            <p class="text-emerald-400 text-sm">powered by Grok</p>
        </div>
        <nav class="flex-1 p-4 space-y-2 text-lg">
            <button onclick="showDashboard()" class="w-full text-left flex items-center gap-3 px-4 py-3 rounded-2xl bg-gray-800 text-white">📊 Dashboard</button>
            <button onclick="showTransactions()" class="w-full text-left flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-gray-800">📋 Transactions</button>
            <button onclick="showChat()" class="w-full text-left flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-gray-800">🤖 AI Chat</button>
        </nav>
        <div class="p-4 border-t border-gray-800">
            <button onclick="logout()" class="w-full bg-red-600 hover:bg-red-700 py-2 rounded-2xl font-semibold">Logout</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-8 overflow-auto">
        <!-- Dashboard View -->
        <div id="dashboard-view">
            <h1 class="text-4xl font-bold mb-8">Good evening, <span id="user-name">User</span> 👋</h1>
            
            <div class="grid grid-cols-3 gap-6 mb-8">
                <div class="bg-gray-900 rounded-3xl p-6 border border-gray-800">
                    <p class="text-gray-400">Total Balance</p>
                    <p class="text-5xl font-semibold text-emerald-400 mt-2">$<span id="balance">0</span></p>
                </div>
                <div class="bg-gray-900 rounded-3xl p-6 border border-gray-800">
                    <p class="text-gray-400">Income</p>
                    <p class="text-5xl font-semibold mt-2">$<span id="income">0</span></p>
                </div>
                <div class="bg-gray-900 rounded-3xl p-6 border border-gray-800">
                    <p class="text-gray-400">Expenses</p>
                    <p class="text-5xl font-semibold text-red-400 mt-2">$<span id="expenses">0</span></p>
                </div>
            </div>

            <div class="bg-gray-900 rounded-3xl p-6 border border-gray-800 mb-8">
                <h3 class="mb-4 font-semibold">Spending Trend</h3>
                <canvas id="chart" class="h-80"></canvas>
            </div>
        </div>

        <!-- Transactions View -->
        <div id="transactions-view" class="hidden">
            <h1 class="text-4xl font-bold mb-8">Transactions</h1>
            
            <div class="bg-gray-900 rounded-3xl p-6 border border-gray-800 mb-8">
                <h3 class="mb-4 font-semibold">Add Transaction</h3>
                <form id="transaction-form" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <input id="desc" type="text" placeholder="Description" class="bg-gray-800 border border-gray-700 rounded-2xl px-4 py-2" required>
                        <input id="amount" type="number" placeholder="Amount" step="0.01" class="bg-gray-800 border border-gray-700 rounded-2xl px-4 py-2" required>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <input id="category" type="text" placeholder="Category (optional)" class="bg-gray-800 border border-gray-700 rounded-2xl px-4 py-2">
                        <button type="submit" class="bg-emerald-500 hover:bg-emerald-600 py-2 rounded-2xl font-semibold">Add</button>
                    </div>
                </form>
            </div>

            <div class="bg-gray-900 rounded-3xl p-6 border border-gray-800">
                <h3 class="mb-4 font-semibold">Recent Transactions</h3>
                <div id="transactions-list" class="space-y-2">
                    <p class="text-gray-400">Loading...</p>
                </div>
            </div>
        </div>

        <!-- Chat View -->
        <div id="chat-view" class="hidden">
            <h1 class="text-4xl font-bold mb-8">Grok AI Chat</h1>
            
            <div class="bg-gray-900 rounded-3xl p-6 border border-gray-800">
                <div id="chat" class="h-96 overflow-auto bg-gray-950 p-4 rounded-2xl mb-4 space-y-3"></div>
                <div class="flex gap-2">
                    <input id="query" placeholder="Ask anything about your money..." 
                           class="flex-1 bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4">
                    <button onclick="sendChat()" class="bg-emerald-500 hover:bg-emerald-600 px-6 py-4 rounded-2xl font-semibold">Send</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login';

    let chart = null;

    async function fetchWithAuth(url, options = {}) {
        const headers = { ...options.headers, 'Authorization': `Bearer ${token}` };
        const res = await fetch(url, { ...options, headers });
        if (res.status === 401) {
            localStorage.removeItem('token');
            window.location.href = '/login';
        }
        return res;
    }

    async function loadDashboard() {
        try {
            const res = await fetchWithAuth('/transactions/');
            const transactions = await res.json();
            
            let balance = 0, income = 0, expenses = 0;
            transactions.forEach(t => {
                balance += t.amount;
                if (t.amount > 0) income += t.amount;
                else expenses += Math.abs(t.amount);
            });

            document.getElementById('balance').textContent = balance.toFixed(2);
            document.getElementById('income').textContent = income.toFixed(2);
            document.getElementById('expenses').textContent = expenses.toFixed(2);

            // Update chart
            const dates = transactions.map(t => new Date(t.date).toLocaleDateString());
            const amounts = transactions.map(t => Math.abs(t.amount));
            
            if (chart) chart.destroy();
            chart = new Chart(document.getElementById('chart'), {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{ label: 'Spending', data: amounts, borderColor: '#10b981', tension: 0.4 }]
                },
                options: { responsive: true, plugins: { legend: { display: false }}}
            });
        } catch (e) {
            console.error('Error loading dashboard:', e);
        }
    }

    async function loadTransactions() {
        try {
            const res = await fetchWithAuth('/transactions/');
            const transactions = await res.json();
            const list = document.getElementById('transactions-list');
            
            if (transactions.length === 0) {
                list.innerHTML = '<p class="text-gray-400">No transactions yet</p>';
                return;
            }

            list.innerHTML = transactions.map(t => `
                <div class="bg-gray-800 p-4 rounded-2xl flex justify-between items-center">
                    <div>
                        <p class="font-semibold">${t.description}</p>
                        <p class="text-sm text-gray-400">${t.category || 'Uncategorized'} • ${new Date(t.date).toLocaleDateString()}</p>
                    </div>
                    <p class="text-lg font-semibold ${t.amount > 0 ? 'text-emerald-400' : 'text-red-400'}">
                        ${t.amount > 0 ? '+' : ''}$${Math.abs(t.amount).toFixed(2)}
                    </p>
                </div>
            `).join('');
        } catch (e) {
            console.error('Error loading transactions:', e);
        }
    }

    document.getElementById('transaction-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const desc = document.getElementById('desc').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const category = document.getElementById('category').value;

        try {
            const res = await fetchWithAuth('/transactions/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ description: desc, amount, category, date: new Date().toISOString() })
            });

            if (res.ok) {
                document.getElementById('transaction-form').reset();
                loadTransactions();
                loadDashboard();
            } else {
                alert('Failed to add transaction');
            }
        } catch (e) {
            alert('Error: ' + e.message);
        }
    });

    async function sendChat() {
        const query = document.getElementById('query').value;
        if (!query) return;

        const chatDiv = document.getElementById('chat');
        chatDiv.innerHTML += `<div class="text-right"><p class="bg-emerald-600 inline-block px-4 py-2 rounded-2xl">${query}</p></div>`;
        document.getElementById('query').value = '';

        try {
            const res = await fetchWithAuth('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query })
            });

            if (res.ok) {
                const data = await res.json();
                chatDiv.innerHTML += `<div class="text-left"><p class="bg-gray-800 inline-block px-4 py-2 rounded-2xl">${data.response}</p></div>`;
                chatDiv.scrollTop = chatDiv.scrollHeight;
            }
        } catch (e) {
            chatDiv.innerHTML += `<div class="text-left"><p class="bg-red-900 inline-block px-4 py-2 rounded-2xl">Error: ${e.message}</p></div>`;
        }
    }

    function showDashboard() {
        document.getElementById('dashboard-view').classList.remove('hidden');
        document.getElementById('transactions-view').classList.add('hidden');
        document.getElementById('chat-view').classList.add('hidden');
        loadDashboard();
    }

    function showTransactions() {
        document.getElementById('dashboard-view').classList.add('hidden');
        document.getElementById('transactions-view').classList.remove('hidden');
        document.getElementById('chat-view').classList.add('hidden');
        loadTransactions();
    }

    function showChat() {
        document.getElementById('dashboard-view').classList.add('hidden');
        document.getElementById('transactions-view').classList.add('hidden');
        document.getElementById('chat-view').classList.remove('hidden');
    }

    function logout() {
        localStorage.removeItem('token');
        window.location.href = '/login';
    }

    // Load dashboard on page load
    loadDashboard();
</script>
</body>
</html>
