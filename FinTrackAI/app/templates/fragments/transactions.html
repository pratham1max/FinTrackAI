<table class="table w-full">
    <thead>
        <tr class="border-b border-gray-700">
            <th class="text-left">Date</th>
            <th class="text-left">Description</th>
            <th class="text-right">Amount</th>
            <th>Category</th>
        </tr>
    </thead>
    <tbody>
        {% for t in transactions %}
        <tr class="border-b border-gray-800">
            <td>{{ t.date }}</td>
            <td>{{ t.description }}</td>
            <td class="text-right font-medium {{ 'text-red-400' if t.amount < 0 else 'text-emerald-400' }}">
                ${{ t.amount }}
            </td>
            <td><div class="badge badge-success">{{ t.category or 'Uncategorized' }}</div></td>
        </tr>
        {% endfor %}
    </tbody>
</table>
